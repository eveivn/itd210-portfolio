<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
    header {
        background-color: #1e3142;
    }
</style>
</head>
<body>
    <header>
        <div class="logo">
            <!--PLACEHOLDER LOGO-->
            <a href="index.html">
                <img src="images/logo2.png" alt="###" class="logo-icon">
            </a>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="series.html">Series</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <!--BEGIN CONTACT PAGE-->
    <main class="contact-container reveal">
        <!--LEFT IMAGE-->
        <section class="contact-left">
            <img src="images/contact.png" alt="#">
        </section>
        <!--RIGHT FORM-->
        <section class="contact-right">
            <!--HEADER-->
            <!--TYPEWRITER EFFECT-->
            <div class="eb-gradient">Questions?
            </div>
            <h1>Get in touch.</h1>
            <form action="https://formspree.io/f/xkgvdngo" method="POST">
                <!--REDIRECT-->
                <input type="hidden" name="_next" value="submit.html" />
                <!--NAME-->
                <label>Name</label>
                    <input type="text" name="name" required>
                <!--EMAIL-->
                <label>Email</label>
                    <input type="email" name="email" required>
                <!--TEXT-->
                <label>Message</label>
                    <textarea name="message" rows="6" required></textarea>
                <!--BUTTON-->
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
    <footer>
        <p>Studio Citrus · ITD 210 · Built with HTML, CSS & JavaScript · 2026</p>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="series.html">Series</a>
            <a href="contact.html">Contact</a>
        </div>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
